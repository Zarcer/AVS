spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      url: ${SPRING_REDIS_URL}

jwt:
  secret: ${JWT_SECRET}

device-go:
  base-url: ${DEVICE_GO_BASE_URL}
