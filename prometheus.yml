scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'mqtt'
    static_configs:
      - targets: ['mqtt-exporter:9234']

  - job_name: 'node'
    static_configs:
      - targets: ['172.17.0.1:9100']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']          