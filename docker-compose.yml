services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: avs
      POSTGRES_PASSWORD: avs_pass
      POSTGRES_DB: avsdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  mqtt:
    image: eclipse-mosquitto:1.6.15
    ports:
      - 1883:1883
      - 9001:9001
    restart: unless-stopped

  device-go:
    build: ./device-go
    environment:
      HTTP_PORT: 8083
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      LOG_LEVEL: info
    restart: unless-stopped

  ingest-go:
    build: ./ingest-go
    environment:
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      POSTGRES_URL: postgres://avs:avs_pass@postgres:5432/avsdb?sslmode=disable
      REDIS_URL: ""
      LOG_LEVEL: info
    restart: unless-stopped

  api-java: 
    build: ./api-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/avsdb
      SPRING_DATASOURCE_USERNAME: avs
      SPRING_DATASOURCE_PASSWORD: avs_pass
      DEVICE_GO_BASE_URL: http://device-go:8083
      JWT_SECRET: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
    restart: unless-stopped

  frontend:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx_server.conf:/etc/nginx/conf.d/default.conf
      - ./etc/letsencrypt:/etc/nginx/ssl
    restart: unless-stopped  

volumes:
  pgdata:
