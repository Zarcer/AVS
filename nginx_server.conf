user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  10000;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;
    include /etc/nginx/conf.d/*.conf;

    server {
        server_name nsu-metrics.ru;
        listen 80;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        server_name nsu-metrics.ru;
        listen 443 ssl;

        ssl_certificate /etc/nginx/ssl/live/nsu-metrics.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/nsu-metrics.ru/privkey.pem;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /dashboard/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api-java:8080;
        }
    }

    server {
        listen 8081;
        location / {
            stub_status on;
            access_log off;
        }
    }    
}

stream {
    server {
        listen 8883 ssl;
        
        ssl_certificate /etc/nginx/ssl/live/nsu-metrics.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/nsu-metrics.ru/privkey.pem;

        proxy_pass mqtt:1883;
        
    }
}