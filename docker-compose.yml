services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: avs
      POSTGRES_PASSWORD: avs_pass
      POSTGRES_DB: avsdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  mqtt:
    image: eclipse-mosquitto:1.6.15
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./passwd:/mosquitto/config/passwd
    restart: unless-stopped

  device-go:
    build: ./device-go
    environment:
      HTTP_PORT: 8083
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: "avs"
      MQTT_PASSWORD: "avs"
      LOG_LEVEL: info
    restart: unless-stopped

  ingest-go:
    build: ./ingest-go
    environment:
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: "avs"
      MQTT_PASSWORD: "avs"
      POSTGRES_URL: postgres://avs:avs_pass@postgres:5432/avsdb?sslmode=disable
      REDIS_URL: ""
      LOG_LEVEL: info
    restart: unless-stopped

  api-java: 
    build: ./api-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/avsdb
      SPRING_DATASOURCE_USERNAME: avs
      SPRING_DATASOURCE_PASSWORD: avs_pass
      DEVICE_GO_BASE_URL: http://device-go:8083
      JWT_SECRET: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
    restart: unless-stopped

  frontend:
    image: nginx:latest
    ports:
      - 443:443
      - 8883:8883
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx_server.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/nginx/ssl
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/etc/prometheus
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - -nginx.scrape-uri=http://frontend:8081
    ports:
      - 9113:9113
    restart: unless-stopped

  mqtt-exporter:
    image: sapcc/mosquitto-exporter:latest
    ports:
      - 9234:9234
    environment:
      - MQTT_ENDPOINT=tcp://mqtt:1883
      - MQTT_USER=avs
      - MQTT_PASS=avs
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: host
    pid: host
    volumes:
      - /:/host
    command:
      - '--path.rootfs=/host'
      - '--web.listen-address=172.17.0.1:9100'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped        


volumes:
  pgdata:
  prometheus_data:
  grafana_data:
