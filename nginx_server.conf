server {
    server_name nsu-metrics.ru;
    listen 80;

    location / {
        return 301 https://$host$request_uri;
    }
}


server {
    server_name nsu-metrics.ru;
    listen 443 ssl;

    ssl_certificate /etc/nginx/ssl/live/nsu-metrics.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/nsu-metrics.ru/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        proxy_pass http://api-java:8080;
    }
}