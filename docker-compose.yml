services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  mqtt:
    image: eclipse-mosquitto:1.6.15
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./passwd:/mosquitto/config/passwd
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "no"]
    restart: unless-stopped

  device-go:
    build: ./device-go
    environment:
      HTTP_PORT: 8083
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      LOG_LEVEL: info
    restart: unless-stopped

  ingest-go:
    build: ./ingest-go
    environment:
      MQTT_BROKER: tcp://mqtt:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      POSTGRES_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    restart: unless-stopped

  api-java: 
    build: ./api-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_REDIS_URL: redis://redis:6379
      DEVICE_GO_BASE_URL: http://device-go:8083
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  frontend:
    image: nginx:latest
    ports:
      - 443:443
      - 8883:8883
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx_server.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/nginx/ssl
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - -nginx.scrape-uri=http://frontend:8081
    restart: unless-stopped

  mqtt-exporter:
    image: sapcc/mosquitto-exporter:latest
    environment:
      - BROKER_ENDPOINT=tcp://mqtt:1883
      - MQTT_USER=${MQTT_USERNAME}
      - MQTT_PASS=${MQTT_PASSWORD}
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://nsu-metrics.ru/dashboard/
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=${GRAFANA_SMTP_USER}
      - GF_SMTP_PASSWORD=${GRAFANA_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GRAFANA_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=AVS Grafana
      - GF_SMTP_SKIP_VERIFY=false
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: host
    pid: host
    volumes:
      - /:/host
    command:
      - '--path.rootfs=/host'
      - '--web.listen-address=172.17.0.1:9100'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      - REDIS_ADDR=redis://redis:6379
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    restart: unless-stopped             

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
